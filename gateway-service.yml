server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/auth/**
            - id: video-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/videos/**
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/users/**

